[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
solc_version = "0.8.28"

[rpc_endpoints]
passet_hub = "https://testnet-passet-hub-eth-rpc.polkadot.io"

[etherscan]
passet_hub = { key = "${BLOCKSCOUT_API_KEY}", url = "https://blockscout-passet-hub.parity-testnet.parity.io/api" }
